server:
  port: 8081

spring:
  application:
    name: raceflow-auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/auth
    username: ${DB_USER:raceflow}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: update
jwt:
  secret: ${JWT_SECRET:raceflow-dev-secret-key-for-local-dev-only-32chars}
  expiration: 86400000

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: local
